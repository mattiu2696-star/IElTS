name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            # Clone repo nếu chưa có, pull nếu đã có
            if [ ! -d /opt/ielts-hub/.git ]; then
              git clone https://github.com/mattiu2696-star/IElTS.git /opt/ielts-hub
            fi

            cd /opt/ielts-hub
            git pull origin main

            # Tạo .env nếu chưa có
            if [ ! -f .env ]; then
              cat > .env << 'ENVEOF'
            JWT_SECRET=ielts-hub-jwt-secret-change-me
            JWT_REFRESH_SECRET=ielts-hub-refresh-secret-change-me
            CLAUDE_API_KEY=
            FRONTEND_URL=http://160.191.85.127
            VITE_API_URL=http://160.191.85.127:3001
            ENVEOF
            fi

            # Dừng container cũ (nếu có)
            docker stop ielts-hub 2>/dev/null || true
            docker rm   ielts-hub 2>/dev/null || true

            # Build & start full stack
            docker compose --env-file .env build
            docker compose --env-file .env up -d

            # Chạy migrations
            sleep 5
            docker compose exec -T backend node -e "
              require('dotenv').config();
              const knex = require('./src/config/db');
              knex.migrate.latest()
                .then(() => knex.seed.run())
                .then(() => { console.log('✅ Migrations done'); process.exit(0); })
                .catch(e => { console.error(e); process.exit(1); });
            "

            # Clean up
            docker image prune -f

            echo "✅ Deploy completed at $(date)"

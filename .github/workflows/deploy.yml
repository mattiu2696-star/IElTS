name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            # Clone repo nếu chưa có
            if [ ! -d /opt/ielts-hub/.git ]; then
              sudo git clone https://github.com/mattiu2696-star/IElTS.git /opt/ielts-hub
            fi

            cd /opt/ielts-hub
            sudo git fetch origin main
            sudo git reset --hard origin/main

            # Tạo .env nếu chưa có
            if [ ! -f /opt/ielts-hub/.env ]; then
              sudo tee /opt/ielts-hub/.env > /dev/null << 'ENVEOF'
            JWT_SECRET=ielts-hub-jwt-secret-change-me
            JWT_REFRESH_SECRET=ielts-hub-refresh-secret-change-me
            CLAUDE_API_KEY=
            FRONTEND_URL=http://160.191.85.127
            VITE_API_URL=http://160.191.85.127:3001
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=ielts_hub
            DB_USER=ielts_user
            DB_PASSWORD=ielts_pass
            ENVEOF
            fi

            # Build & deploy
            cd /opt/ielts-hub
            sudo docker compose --env-file .env build --no-cache
            sudo docker compose --env-file .env up -d --force-recreate

            # Chạy migrations & seed
            sleep 8
            sudo docker compose --env-file .env exec -T backend npx knex migrate:latest --env production
            sudo docker compose --env-file .env exec -T backend npx knex seed:run --env production

            # Clean up
            sudo docker image prune -f

            echo "✅ Deploy completed at $(date)"
